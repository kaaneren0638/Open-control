name: Build Signed APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip

          mkdir -p "$HOME/android-sdk/cmdline-tools"

          unzip -q tools.zip -d "$HOME/android-sdk/cmdline-tools"

          mv "$HOME/android-sdk/cmdline-tools/cmdline-tools" \
             "$HOME/android-sdk/cmdline-tools/latest"

          export ANDROID_SDK_ROOT=$HOME/android-sdk

          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;35.0.0"

          echo "$ANDROID_SDK_ROOT/build-tools/35.0.0" >> $GITHUB_PATH


      - name: Build APK
        run: |
          java -jar apktool.jar b . -o unsigned.apk

      - name: Generate Debug Keystore
        run: |
          keytool \
          -genkeypair \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -keystore debug.keystore \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug
