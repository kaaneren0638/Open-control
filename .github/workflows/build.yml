name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Apktool
        run: |
          wget -O apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.11.1/apktool_2.11.1.jar

      - name: Build APK
        run: |
          java -jar apktool.jar b . -o OpenControl.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenControl
          path: OpenControl.apk
