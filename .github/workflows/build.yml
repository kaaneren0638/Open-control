name: Build Signed APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Apktool
        run: |
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.11.1/apktool_2.11.1.jar -O apktool.jar

      - name: Build APK
        run: |
          java -jar apktool.jar b . -o OpenControl.apk

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        run: |
          jarsigner \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            OpenControl.apk \
            androiddebugkey

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenControl-Signed
          path: OpenControl.apk
